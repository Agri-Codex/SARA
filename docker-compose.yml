version: '3.9'
services:
  sara-backend:
    image: python:3.10
    working_dir: /app
    volumes:
      - ./:/app
    command: bash -c "pip install fastapi uvicorn pyjwt && uvicorn saas_backend.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  sara-frontend:
    image: node:20
    working_dir: /app/saas_frontend
    volumes:
      - ./:/app
    command: bash -c "npm install && npm run dev"
    ports:
      - "5173:5173"
